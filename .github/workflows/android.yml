name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Prepare environment config
        # Build a real .env from GitHub repo secrets if they exist, so the
        # APK gets the real Supabase URL/key baked into BuildConfig.
        # If the secrets aren't set (e.g. on a fork), we fall back to
        # .env.example and the app will hit placeholder.supabase.co --
        # sign-in will fail with a clear error, but the build still works.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_KEY" ]; then
            echo "Using real Supabase credentials from GitHub Secrets."
            {
              echo "GEMINI_API_KEY=placeholder_api_key"
              echo "SUPABASE_URL=$SUPABASE_URL"
              echo "SUPABASE_KEY=$SUPABASE_KEY"
            } > .env
          else
            echo "WARNING: SUPABASE_URL / SUPABASE_KEY secrets are not set."
            echo "Falling back to .env.example -- sign-in will not work."
            cp .env.example .env
          fi

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, creating a new debug keystore as a fallback"
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: custom-notifier-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
