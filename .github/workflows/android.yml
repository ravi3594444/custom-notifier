name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Set Supabase environment variables
        # Set env vars that app/build.gradle.kts reads via System.getenv()
        # to populate BuildConfig.SUPABASE_URL / BuildConfig.SUPABASE_KEY.
        #
        # We no longer use the secrets-gradle-plugin (it was corrupting the
        # URL via java.util.Properties ISO-8859-1 encoding -- turning 'u'
        # into 'ú'). The build.gradle.kts file has hardcoded fallbacks for
        # these env vars, so technically this step is redundant on CI --
        # but setting them explicitly makes the build reproducible and
        # documents the intent.
        #
        # SECURITY: SUPABASE_KEY is the anon public key, NOT service_role.
        # The anon key ships in every APK and is safe to expose. RLS
        # policies (supabase_setup.sql) protect the data.
        run: |
          echo "SUPABASE_URL=https://hhwwevlstzuvjpewkaiz.supabase.co" >> "$GITHUB_ENV"
          echo "SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhod3dldmxzdHp1dmpwZXdrYWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDI4OTQsImV4cCI6MjA5OTE3ODg5NH0.Jpjy0gN_PiKGFmuJUbMBTMrYGECStXoKKz4YmVmLib0" >> "$GITHUB_ENV"
          echo "GEMINI_API_KEY=placeholder_api_key" >> "$GITHUB_ENV"
          echo "Set SUPABASE_URL=https://hhwwevlstzuvjpewkaiz.supabase.co"

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, creating a new debug keystore as a fallback"
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: custom-notifier-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
