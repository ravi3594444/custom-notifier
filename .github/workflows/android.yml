name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Prepare environment config
        # Write the real Supabase credentials directly into .env so the
        # APK gets them baked into BuildConfig at build time.
        #
        # SECURITY NOTE: The SUPABASE_KEY below is the "anon" / "public"
        # key, NOT the "service_role" key. The anon key is designed to be
        # shipped in client apps (it's embedded in every APK we publish,
        # so anyone can extract it anyway). Row-Level Security policies
        # in supabase_setup.sql protect the data -- each authenticated
        # user can only read/write their own row. The service_role key
        # (which bypasses RLS) must NEVER be put here.
        #
        # If you fork this repo, replace these with your own Supabase
        # project's anon key + URL, or set SUPABASE_URL / SUPABASE_KEY
        # in GitHub Secrets and the block below will use those instead.
        env:
          FALLBACK_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          FALLBACK_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Prefer GitHub Secrets if they exist (lets forks override),
          # otherwise use the hardcoded defaults below.
          URL="${FALLBACK_SUPABASE_URL:-https://hhwwevlstzuvjpewkaiz.supabase.co}"
          KEY="${FALLBACK_SUPABASE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhod3dldmxzdHp1dmpwZXdrYWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDI4OTQsImV4cCI6MjA5OTE3ODg5NH0.Jpjy0gN_PiKGFmuJUbMBTMrYGECStXoKKz4YmVmLib0}"
          # IMPORTANT: do NOT put comments or blank lines in the .env file.
          # The secrets-gradle-plugin parses .env as a Java properties file
          # and some versions choke on inline comments or extra whitespace.
          # Only KEY=VALUE lines, nothing else.
          printf 'GEMINI_API_KEY=placeholder_api_key\nSUPABASE_URL=%s\nSUPABASE_KEY=%s\n' "$URL" "$KEY" > .env
          echo "Wrote .env with SUPABASE_URL=$URL"
          # Sanity-check the file so we catch any quoting bug in CI logs
          # (without leaking the key):
          echo "--- .env contents (key redacted) ---"
          sed 's/\(SUPABASE_KEY=\).*/\1<redacted>/' .env

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found, creating a new debug keystore as a fallback"
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: custom-notifier-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
